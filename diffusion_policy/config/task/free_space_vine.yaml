      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    camera3_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    camera4_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    camera5_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    camera6_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    camera7_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    camera8_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    camera9_rgb:
      shape: [3, 224, 224]
