name: free_space_vine

camera_obs_latency: 0
robot_obs_latency: 0
dataset_frequeny: 15
obs_down_sample_steps: 3

low_dim_obs_horizon: 2
img_obs_horizon: 2
action_horizon: 8
num_imus: 6
num_segments: 6
action_repr: angle  # encoder | angle
action_dim: 0  # filled in train.py based on action_repr
use_joint_angle_obs: true
use_relative_action_obs: true
execute_steps: 8
ignore_proprioception: False

save_imu_in_dataset: true
# Optional: fixed number of camera streams (e.g. 19). Fewer streams per session are black-padded; omit for "first session sets count".
expected_num_cameras: null

shape_meta: &shape_meta
  obs:
    camera0_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
    camera1_rgb:
      shape: [3, 224, 224]
      horizon: ${task.img_obs_horizon}
      latency_steps: 0
      down_sample_steps: ${task.obs_down_sample_steps}
      type: rgb
      ignore_by_policy: False
